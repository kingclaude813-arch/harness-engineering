name: 자동 문서화 & 주간 리포트

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "**.js"
      - "**.ts"
  schedule:
    - cron: "0 9 * * MON"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 코드 변경 시 자동 CHANGELOG 생성 ─────────────────────
  update-changelog:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate CHANGELOG entry
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import subprocess, os, datetime

          today = datetime.date.today().strftime("%Y-%m-%d")

          # 최근 커밋 메시지 수집
          result = subprocess.run(
              ["git", "log", "--oneline", "-10"],
              capture_output=True, text=True
          )
          commits = result.stdout.strip()

          # Claude API 시도 (API 키가 있고 유효한 경우만)
          entry = None
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")

          if api_key and not api_key.startswith("sk-ant-oat"):
              try:
                  import anthropic
                  client = anthropic.Anthropic(api_key=api_key)
                  msg = client.messages.create(
                      model="claude-haiku-4-5-20251001",
                      max_tokens=512,
                      messages=[{
                          "role": "user",
                          "content": f"다음 커밋들을 보고 간결한 CHANGELOG 항목을 작성해주세요 (한국어):\n\n{commits}"
                      }]
                  )
                  entry = msg.content[0].text
                  print("Claude로 CHANGELOG 생성 완료")
              except Exception as e:
                  print(f"Claude API 실패, 기본 형식 사용: {e}")

          # API 없으면 커밋 목록 그대로 기록
          if not entry:
              lines = [f"- {c}" for c in commits.splitlines() if c]
              entry = "\n".join(lines) if lines else "- 변경사항 없음"
              print("기본 형식으로 CHANGELOG 생성")

          with open("CHANGELOG.md", "a", encoding="utf-8") as f:
              f.write(f"\n\n## [{today}]\n{entry}\n")

          print("CHANGELOG 업데이트 완료")
          EOF

      - name: Commit CHANGELOG
        run: |
          git config user.name "Harness Bot"
          git config user.email "bot@harness-engineering.dev"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: CHANGELOG 자동 업데이트 [skip ci]"
          git push

  # ── 주간 리포트 생성 및 Discord 전송 ────────────────────
  weekly-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic httpx --break-system-packages

      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import subprocess, os, httpx, datetime

          today = datetime.date.today().strftime("%Y-%m-%d")

          result = subprocess.run(
              ["git", "log", "--oneline", "--since=7 days ago"],
              capture_output=True, text=True
          )
          commits = result.stdout.strip() or "이번 주 커밋 없음"

          report = None
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")

          if api_key and not api_key.startswith("sk-ant-oat"):
              try:
                  import anthropic
                  client = anthropic.Anthropic(api_key=api_key)
                  msg = client.messages.create(
                      model="claude-haiku-4-5-20251001",
                      max_tokens=800,
                      messages=[{
                          "role": "user",
                          "content": f"다음 주간 커밋 내역을 팀이 읽기 좋은 주간 리포트로 작성해주세요 (한국어):\n\n{commits}"
                      }]
                  )
                  report = msg.content[0].text
              except Exception as e:
                  print(f"Claude API 실패: {e}")

          if not report:
              report = f"**이번 주 커밋 내역:**\n" + "\n".join(f"- {c}" for c in commits.splitlines())

          webhook = os.environ.get("DISCORD_WEBHOOK_URL")
          if webhook:
              httpx.post(webhook, json={
                  "username": "Harness Bot",
                  "embeds": [{
                      "title": f"📊 주간 리포트 ({today})",
                      "description": report[:1800],
                      "color": 0x5865F2,
                      "footer": {"text": "Harness Engineering | 자동 생성"}
                  }]
              }, timeout=10)
              print("주간 리포트 Discord 전송 완료")
          EOF
